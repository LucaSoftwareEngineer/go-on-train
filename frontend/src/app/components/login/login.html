<section class="bg-gray-50 dark:bg-gray-900">
   <div
      class="flex flex-col items-center justify-center px-6 py-8 mx-auto md:h-screen lg:py-0"
      >
      <a
         [routerLink]="['/']"
         class="flex items-center mb-6 text-2xl font-semibold text-gray-900 dark:text-white"
         >
      <img class="w-8 h-8 mr-2" src="./logo.png" alt="logo" />
      <span class="text-[#421F63]">Go On</span>
      <span class="ml-[8px]">The Train</span>
      </a>
      <div
         class="w-full bg-white rounded-lg shadow dark:border md:mt-0 sm:max-w-md xl:p-0 dark:bg-gray-800 dark:border-gray-700"
         >
         <div class="p-6 space-y-4 md:space-y-6 sm:p-8">
            <h1
               class="text-xl font-bold leading-tight tracking-tight text-gray-900 md:text-2xl dark:text-white"
               >
               Accedi alla tua area riservata
            </h1>
            <form
            #loginForm="ngForm"
            class="space-y-4 md:space-y-6"
            (submit)="loginHandler()"
            >
            <div>
               <label
                  for="email"
                  class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                  >Inserisci email</label
                  >
               <input
               type="email"
               name="email"
               id="email"
               [(ngModel)]="email"
               class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
               placeholder="name@company.com"
               required=""
               />
            </div>
            <div>
               <label
                  for="password"
                  class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                  >Inserisci password</label
                  >
               <input
               type="password"
               name="password"
               id="password"
               [(ngModel)]="password"
               placeholder="••••••••"
               class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
               required=""
               />
            </div>
            <div class="flex items-center justify-between">
               <div class="flex items-start">
                  <div class="flex items-center h-5">
                     <input
                        id="remember"
                        aria-describedby="remember"
                        type="checkbox"
                        (click)="salvaCredenzialiHandler()"
                        class="w-4 h-4 border border-gray-300 rounded bg-gray-50 focus:ring-3 focus:ring-primary-300 dark:bg-gray-700 dark:border-gray-600 dark:focus:ring-primary-600 dark:ring-offset-gray-800"
                        required=""
                        />
                  </div>
                  <div class="ml-3 text-sm">
                     <label for="remember" class="text-gray-500 dark:text-gray-300"
                        >Salva credenziali</label
                        >
                  </div>
               </div>
               <a
                  [routerLink]="['/password/reset']"
                  class="text-sm font-medium text-primary-600 hover:underline dark:text-primary-500"
                  >Password dimenticata?</a
                  >
            </div>
            <button
               type="submit"
               class="w-full cursor-pointer text-white bg-[#421F63] hover:bg-black focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 me-2 mb-2 dark:bg-blue-600 dark:hover:bg-blue-700 focus:outline-none dark:focus:ring-blue-800"
               >
            Accedi
            </button>
            <p class="text-sm font-light text-gray-500 dark:text-gray-400">
               Non hai un account?
               <a
                  [routerLink]="['/register']"
                  class="font-medium text-primary-600 hover:underline dark:text-primary-500"
                  >Registrati ora</a
                  >
            </p>
            </form>
         </div>
      </div>
   </div>
</section>
